services:
  - type: web
    name: tznobar-catalog
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: EDIT_PIN
        sync: false
